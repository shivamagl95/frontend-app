name: Build and Push Docker Image to ECR

on:
  push:
    branches:
      - main 

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: frontend-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.iam_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        working-directory: ./web
        run: docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Install ArgoCD CLI
        run: |
          VERSION=$(curl -s https://api.github.com/repos/argoproj/argo-cd/releases/latest | jq -r .tag_name)

          curl -sSL -o argocd \
            https://github.com/argoproj/argo-cd/releases/download/${VERSION}/argocd-linux-amd64

          chmod +x argocd

          sudo mv argocd /usr/local/bin/

      - name: Update ArgoCD Image
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: frontend-app
        run: |

          IMAGE_TAG=${GITHUB_SHA::8}

          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "Updating image to ${IMAGE_URI}"

          curl -k \
            -X PATCH \
            "http://${ARGOCD_SERVER}/api/v1/applications/frontend-app?patchType=application%2Fmerge-patch%2Bjson" \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"spec\": {
                \"source\": {
                  \"kustomize\": {
                    \"images\": [
                      \"${IMAGE_URI}\"
                    ]
                  }
                }
              }
            }"

      - name: Sync ArgoCD App
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |

          curl -k \
            -X POST \
            "http://${ARGOCD_SERVER}/api/v1/applications/frontend-app/sync" \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -H "Content-Type: application/json"

      - name: Get Application
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |

          curl -k \
            "http://${ARGOCD_SERVER}/api/v1/applications/frontend-app" \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}"